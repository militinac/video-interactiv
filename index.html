<script>
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

var player;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '400',
    width: '100%',
    videoId: 'M7lc1UVf-VE' // pune ID-ul tău aici
  });

  setInterval(checkTime, 1000);
}

var score = 0;
var currentQuestion = null;

var questions = [
  { time: 5, id: "q1", shown: false },
  { time: 10, id: "q2", shown: false }
];

function checkTime() {
  if (!player || !player.getCurrentTime) return;

  var t = Math.floor(player.getCurrentTime());

  for (var i = 0; i < questions.length; i++) {
    var q = questions[i];

    if (t === q.time && !q.shown) {
      q.shown = true;
      player.pauseVideo();
      currentQuestion = q.id;
      document.getElementById(q.id).style.display = "block";
      break;
    }
  }
}

function answer(correct){
  if(correct) score++;

  document.getElementById(currentQuestion).style.display = "none";
  player.playVideo();

  if(questions.every(q => q.shown)){
    document.getElementById("result").innerHTML =
      "Scor: " + score + "/" + questions.length;
  }
}
</script>
