<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Video Interactiv</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f4f4;
}
.question {
  display: none;
  background: white;
  padding: 20px;
  margin: 20px auto;
  width: 60%;
  border-radius: 10px;
}
button {
  margin: 10px;
  padding: 10px;
}
</style>

<script src="https://www.youtube.com/iframe_api"></script>
</head>

<body>

<h2>Video Interactiv</h2>

<div id="player"></div>

<div id="q1" class="question">
  <p>Ce este inerția?</p>
  <button onclick="answer(true)">Corect</button>
  <button onclick="answer(false)">Greșit</button>
</div>

<div id="q2" class="question">
  <p>De ce te miști înainte?</p>
  <button onclick="answer(true)">Inerție</button>
  <button onclick="answer(false)">Alt motiv</button>
</div>

<div id="result"></div>

<script>
let player;
let score = 0;
let currentQuestion = null;

let questions = [
  { time: 5, id: "q1", shown: false },
  { time: 10, id: "q2", shown: false }
];

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '360',
    width: '640',
    videoId: 'YZY74HLqJ4Y'
  });

  setInterval(checkTime, 1000);
}

function checkTime() {
  let t = Math.floor(player.getCurrentTime());

  questions.forEach(q => {
    if (t === q.time && !q.shown) {
      q.shown = true;
      player.pauseVideo();
      currentQuestion = q.id;
      document.getElementById(q.id).style.display = "block";
    }
  });
}

function answer(correct){
  if(correct) score++;

  document.getElementById(currentQuestion).style.display = "none";
  player.playVideo();

  if(questions.every(q => q.shown)){
    document.getElementById("result").innerHTML =
      "Scor: " + score + "/" + questions.length;
  }
}
</script>

</body>
</html>
