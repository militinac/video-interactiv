<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Video Interactiv</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f4f4;
}

/* Player */
#player {
  margin: 20px auto;
}

/* Accordion */
.accordion-item {
  border: 1px solid #ccc;
  border-radius: 8px;
  margin-bottom: 10px;
  background: #fff;
  width: 60%;
  margin-left: auto;
  margin-right: auto;
  text-align: left;
}
.accordion-header {
  background: #f2f2f2;
  padding: 12px;
  font-weight: bold;
  cursor: pointer;
}
.accordion-body {
  display: none;
  padding: 10px;
}

/* Checkbox feedback */
.correct {
  background-color: #c8e6c9; /* verde */
}
.wrong {
  background-color: #ffcdd2; /* rosu */
}

/* Buton */
button {
  margin: 5px 0;
  padding: 8px 12px;
}
.feedback {
  margin-top: 10px;
  font-weight: bold;
}
</style>

<script src="https://www.youtube.com/iframe_api"></script>
</head>

<body>

<h2>Video Interactiv</h2>
<div id="player"></div>

<!-- Întrebări accordion -->
<div id="q1" class="accordion-item">
  <div class="accordion-header" onclick="toggleAccordion('body1')">
    1. Ce este inerția?
  </div>
  <div class="accordion-body" id="body1">
    <label><input type="checkbox" class="q1-answer" data-correct="true"> Păstrează starea de mișcare</label><br>
    <label><input type="checkbox" class="q1-answer" data-correct="true"> Păstrează starea de repaus</label><br>
    <label><input type="checkbox" class="q1-answer" data-correct="false"> Schimbă viteza spontan</label><br>
    <button onclick="checkAnswer('q1')">Trimite răspuns</button>
    <div class="feedback" id="feedback-q1"></div>
  </div>
</div>

<div id="q2" class="accordion-item">
  <div class="accordion-header" onclick="toggleAccordion('body2')">
    2. De ce te miști înainte?
  </div>
  <div class="accordion-body" id="body2">
    <label><input type="checkbox" class="q2-answer" data-correct="true"> Inerție</label><br>
    <label><input type="checkbox" class="q2-answer" data-correct="false"> Alt motiv</label><br>
    <button onclick="checkAnswer('q2')">Trimite răspuns</button>
    <div class="feedback" id="feedback-q2"></div>
  </div>
</div>

<div id="result" style="margin-top:20px; font-weight:bold;"></div>

<script>
let player;
let score = 0;
let currentQuestion = null;

let questions = [
  { time: 5, id: "q1", shown: false },
  { time: 10, id: "q2", shown: false }
];

/* YouTube Player */
function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '360',
    width: '640',
    videoId: 'YZY74HLqJ4Y'
  });

  setInterval(checkTime, 1000);
}

/* Accordion toggle */
function toggleAccordion(id) {
  const el = document.getElementById(id);
  el.style.display = (el.style.display === 'block') ? 'none' : 'block';
}

/* Verificare moment video */
function checkTime() {
  if (!player || !player.getCurrentTime) return;

  let t = Math.floor(player.getCurrentTime());

  questions.forEach(q => {
    if (t === q.time && !q.shown) {
      q.shown = true;
      player.pauseVideo();
      currentQuestion = q.id;
      document.getElementById("body" + q.id.slice(1)).style.display = "block";
    }
  });
}

/* Verificare răspunsuri checkbox */
function checkAnswer(qid) {
  let inputs = document.querySelectorAll(`.${qid}-answer`);
  let feedback = document.getElementById("feedback-" + qid);
  let allCorrect = true;

  inputs.forEach(inp => {
    inp.parentElement.classList.remove('correct', 'wrong');
    if ((inp.checked && inp.dataset.correct === "true") ||
        (!inp.checked && inp.dataset.correct === "false")) {
      inp.parentElement.classList.add('correct');
    } else {
      inp.parentElement.classList.add('wrong');
      allCorrect = false;
    }
  });

  feedback.innerHTML = allCorrect ? "Răspuns corect!" : "Răspuns greșit! Vezi verdele pentru corect.";
  
  if(allCorrect) score++;

  // video pornit manual pentru a constientiza feedback-ul
  // puteți activa automat dacă vreți: player.playVideo();
  
  // ascundem întrebarea după răspuns
   document.getElementById("body" + qid.slice(1)).style.display = "none";

  // Verificăm scor final
  if(questions.every(q => q.shown)){
    document.getElementById("result").innerHTML = "Scor: " + score + "/" + questions.length;
  }
}
</script>

</body>
</html>
