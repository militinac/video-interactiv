<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Video Interactiv</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f4f4;
}
#player { margin: 20px auto; }
.accordion { width: 80%; margin: 20px auto; }
.accordion-item { background: white; border-radius: 10px; margin-bottom: 10px; padding: 10px; }
.accordion-header { cursor: pointer; font-weight: bold; padding: 10px; background: #eee; border-radius: 5px; }
.accordion-body { display: none; padding: 10px; text-align: left; }
button { margin: 5px; padding: 8px 12px; }
.correct { background-color: #d4edda; color: #155724; }
.wrong { background-color: #f8d7da; color: #721c24; }
.feedback { margin-top: 10px; font-weight: bold; }
</style>

<script src="https://www.youtube.com/iframe_api"></script>
</head>

<body>

<h2>Video Interactiv</h2>

<div id="player"></div>

<div class="accordion" id="questionsAccordion">

  <!-- Întrebarea 1 -->
  <div class="accordion-item" id="q1">
    <div class="accordion-header" onclick="toggleAccordion('body1')">
      1. Ce proprietăți are inerția?
    </div>
    <div class="accordion-body" id="body1">
      <label><input type="checkbox" class="q1-answer" data-correct="true"> Păstrează starea de mișcare</label><br>
      <label><input type="checkbox" class="q1-answer" data-correct="true"> Păstrează starea de repaus</label><br>
      <label><input type="checkbox" class="q1-answer" data-correct="false"> Schimbă viteza spontan</label><br>
      <button onclick="checkAnswer('q1')">Trimite răspuns</button>
      <div class="feedback" id="feedback-q1"></div>
    </div>
  </div>

  <!-- Întrebarea 2 -->
  <div class="accordion-item" id="q2">
    <div class="accordion-header" onclick="toggleAccordion('body2')">
      2. De ce te miști înainte în autobuz când frânează?
    </div>
    <div class="accordion-body" id="body2">
      <label><input type="checkbox" class="q2-answer" data-correct="true"> Datorită inerției</label><br>
      <label><input type="checkbox" class="q2-answer" data-correct="false"> Pentru că autobuzul accelerează</label><br>
      <label><input type="checkbox" class="q2-answer" data-correct="false"> Din cauza pasagerilor din față</label><br>
      <button onclick="checkAnswer('q2')">Trimite răspuns</button>
      <div class="feedback" id="feedback-q2"></div>
    </div>
  </div>

</div>

<div id="result"></div>

<script>
let player;
let score = 0;
let currentQuestion = null;

let questions = [
  { time: 5, id: "q1", shown: false },
  { time: 10, id: "q2", shown: false }
];

// YouTube API
function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '360',
    width: '640',
    videoId: 'YZY74HLqJ4Y'
  });

  // Verifică timpul video la fiecare 500ms
  setInterval(checkTime, 500);
}

// Accordion toggle
function toggleAccordion(id) {
  const body = document.getElementById(id);
  body.style.display = (body.style.display === 'block') ? 'none' : 'block';
}

// Oprirea video și afișarea întrebării
function checkTime() {
  if (!player || !player.getCurrentTime) return;
  const t = Math.floor(player.getCurrentTime());
  questions.forEach(q => {
    if (t === q.time && !q.shown) {
      q.shown = true;
      currentQuestion = q.id;
      document.getElementById(q.id).querySelector('.accordion-body').style.display = 'block';
      player.pauseVideo();
      alert("Video oprit. Răspunde la întrebare!");
    }
  });
}

// Verificarea răspunsurilor multiple
function checkAnswer(qId) {
  const answers = document.querySelectorAll(`.${qId}-answer`);
  let correct = true;
  answers.forEach(input => {
    const isChecked = input.checked;
    const isCorrect = input.getAttribute('data-correct') === "true";
    if(isChecked !== isCorrect) correct = false;
    input.parentElement.className = '';
    if(isCorrect) input.parentElement.classList.add('correct');
    else if(isChecked && !isCorrect) input.parentElement.classList.add('wrong');
  });

  const feedbackDiv = document.getElementById('feedback-' + qId);
  if(correct) {
    feedbackDiv.innerText = "Răspuns corect!";
    score++;
  } else {
    feedbackDiv.innerText = "Răspuns greșit! Corect este marcat verde.";
  }

  // Dezactivează inputurile și butonul
  answers.forEach(input => input.disabled = true);
  feedbackDiv.previousElementSibling.disabled = true;

  // Alertă să pornească video
  alert("Apasă Play pentru a continua video-ul!");
  showResult();
}

// Afișarea scorului final
function showResult() {
  document.getElementById("result").innerHTML = "Scor: " + score + "/" + questions.length;
}
</script>

</body>
</html>
